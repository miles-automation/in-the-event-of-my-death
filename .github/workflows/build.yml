name: Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build"
        required: true
        default: "main"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install backend deps
        working-directory: backend
        run: poetry install --no-interaction

      - uses: actions/setup-node@v4
        with:
          node-version: "current"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - run: make check

  build_image:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          short_sha="$(git rev-parse --short=7 HEAD)"
          echo "sha_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER}/ieomd-app" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_BTCPAY_POS_URL=https://pay.sparkswarm.com/apps/iDBhhgYHJbiqqvCLCDpPWXf8mx1/pos
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.image }}:latest
